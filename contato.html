<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:white;
    min-height:100vh;
    padding:40px;
    color:#111;
}

/* ================= CONTAINER ================= */

.container{
    width:100%;
    position:relative;
}

/* ================= SIDEBAR ================= */

.sidebar{
    width:700px;
    position:fixed;
    top:40px;
    left:40px;
}

.name-button{
    display:inline-block;
    font-size:clamp(22px,3vw,34px);
    line-height:1;
    font-weight:bold;
    color:#111;
    margin-bottom:20px;
    text-decoration:none;
    transition:.3s;
    white-space:normal;
    word-break:break-word;
}

.name-button:hover{
    opacity:.6;
    transform:translateX(3px);
}

.sidebar p{
    color:gray;
    font-size:15px;
    margin-bottom:70px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.menu a{
    text-decoration:none;
    color:gray;
    font-size:16px;
    transition:.3s;
    width:fit-content;
}

.menu a:hover{
    color:black;
    transform:translateX(5px);
}

.active{
    color:black !important;
    font-weight:bold;
}

/* ================= CONTENT ================= */

.content{
    width:100%;
    min-height:100vh;

    padding-left:520px;
    padding-right:100px;

    display:flex;
    align-items:center;
    justify-content:center;
}

/* ================= CONTACT BOX ================= */

.contact-box{
    text-align:center;
}

.contact-box h2{
    font-size:60px;
    color:#111;
    margin-bottom:35px;
    font-weight:bold;
}

.contact-box p{
    font-size:20px;
    color:#111;
    margin-bottom:18px;
}

.location{
    margin-top:30px;
    color:gray;
    font-size:15px;
}

/* ================= RESPONSIVO ================= */

@media(max-width:1200px){

    .content{
        padding-left:420px;
        padding-right:40px;
    }

    .sidebar{
        width:320px;
    }

}

@media(max-width:980px){

    body{
        padding:25px;
    }

    .sidebar{
        position:relative;
        width:100%;
        top:0;
        left:0;
        margin-bottom:50px;
    }

    .content{
        min-height:auto;
        padding-left:0;
        padding-right:0;
        justify-content:center;
        text-align:center;
    }

}

@media(max-width:768px){

    body{
        padding:18px;
    }

    .name-button{
        font-size:28px;
    }

    .sidebar p{
        margin-bottom:40px;
    }

    .menu{
        gap:14px;
    }

    .menu a{
        font-size:15px;
    }

    .contact-box h2{
        font-size:42px;
    }

    .contact-box p{
        font-size:17px;
        word-break:break-word;
    }

}

@media(max-width:480px){

    body{
        padding:14px;
    }

    .name-button{
        font-size:22px;
        line-height:1.1;
    }

    .contact-box h2{
        font-size:34px;
    }

    .contact-box p{
        font-size:15px;
    }

    .location{
        font-size:14px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <a href="index.html" class="name-button">
            Guilherme Ferraz Nascimento
        </a>

        <p>Industrial Designer Student</p>

        <div class="menu">
            <a href="work.html">Work</a>
            <a href="academic.html">Academic</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>

    </div>

    <!-- CONTENT -->

    <div class="content">

        <div class="contact-box">

            <h2>Contact</h2>

            <p>yourboy@gui@gmail.com</p>

            <p>+55 31 99273-8640</p>

            <div class="location">
                Belo Horizonte, Minas Gerais, Brasil.
            </div>

        </div>

    </div>

</div>

</body>
</html>
